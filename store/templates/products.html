<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Store</title>

    <!-- Bootstrap CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    >
</head>
<body class="bg-light">

<div class="container mt-4">
    <h2 class="mb-4">Products</h2>
    <a href="/store/cart/" class="btn btn-outline-primary">
        🛒 View Cart
    </a>

    <!-- Search & Sort -->
    <div class="row mb-3">
        <div class="col-md-6">
            <input type="text" id="search" class="form-control" placeholder="Search products">
        </div>
        <div class="col-md-3">
            <select id="order" class="form-select">
                <option value="">Sort</option>
                <option value="price">Price ↑</option> 
                <option value="-price">Price ↓</option>
            </select>
        </div>
    </div>

    <!-- Products -->
    <div class="row" id="products"></div>

    <!-- Pagination -->
    <div class="d-flex justify-content-between mt-4">
        <button class="btn btn-secondary" id="prevBtn">Previous</button>
        <button class="btn btn-secondary" id="nextBtn">Next</button>
    </div>
</div>

<script>
let currentPage = 1;
let cartId = localStorage.getItem("cart_id"); // global variable

/* ---------------- CART ---------------- */
async function createCart() {
    if (cartId) {
        // Check if cart exists
        const response = await fetch(`/api/store/carts/${cartId}/`);
        if (response.ok) return cartId;
        // If 404, cart was deleted/checked out
        localStorage.removeItem("cart_id");
        cartId = null;
    }

    // Create a new cart
    const response = await fetch("/api/store/carts/", {
        method: "POST",
        headers: { "Content-Type": "application/json" }
    });
    const data = await response.json();
    cartId = data.id;
    localStorage.setItem("cart_id", cartId);
    return cartId;
}


async function addToCart(productId) {
    const cart = await createCart();

    await fetch(`/api/store/carts/${cart}/cart-items/`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ product_id: productId, quantity: 1 })
    });

    alert("Added to cart ✅");
}

/* ---------------- PRODUCTS ---------------- */
async function loadProducts(search = "", order = "", page = 1) {
    const url = `/api/store/products/?search=${search}&ordering=${order}&page=${page}`;
    const response = await fetch(url);
    const data = await response.json();

    const container = document.getElementById("products");
    container.innerHTML = "";

    data.results.forEach(product => {
        container.innerHTML += `
            <div class="col-md-4 mb-4">
                <div class="card h-100 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">${product.title}</h5>
                        <p class="card-text">${product.description}</p>
                        <p><strong>$${product.price}</strong></p>
                        <p class="text-muted">Stock: ${product.inventory}</p>
                        <a href="/store/product/${product.id}/" class="btn btn-outline-secondary mb-2">
                            View Details
                        </a>

                        <button class="btn btn-primary"
                            onclick="addToCart(${product.id})">
                            Add to Cart
                        </button>
                    </div>
                </div>
            </div>
        `;
    });

    // Pagination buttons
    document.getElementById("prevBtn").disabled = !data.previous;
    document.getElementById("nextBtn").disabled = !data.next;
}

/* ---------------- EVENTS ---------------- */
loadProducts();

document.getElementById("search").addEventListener("keyup", e => {
    currentPage = 1;
    loadProducts(e.target.value, document.getElementById("order").value, currentPage);
});

document.getElementById("order").addEventListener("change", e => {
    currentPage = 1;
    loadProducts(document.getElementById("search").value, e.target.value, currentPage);
});

document.getElementById("nextBtn").addEventListener("click", () => {
    currentPage++;
    loadProducts(document.getElementById("search").value, document.getElementById("order").value, currentPage);
});

document.getElementById("prevBtn").addEventListener("click", () => {
    if (currentPage > 1) {
        currentPage--;
        loadProducts(document.getElementById("search").value, document.getElementById("order").value, currentPage);
    }
});
</script>

</body>
</html>
