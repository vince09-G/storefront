
{% load static %}

{% block content %}

<div class="container mt-5">
    <h2>Checkout</h2>

    <div id="error-msg" class="text-danger mb-3"></div>

    <button id="place-order-btn" class="btn btn-success">
        Place Order
    </button>
</div>

<script>
let createdOrderId = null;

/* ---------------- SAFE JSON PARSER ---------------- */
async function safeJson(response) {
    const text = await response.text();
    try {
        return JSON.parse(text);
    } catch (e) {
        console.error("Invalid JSON:", text);
        throw new Error("Server returned invalid response.");
    }
}

/* ---------------- CREATE ORDER ---------------- */
async function createOrder() {
    const cartId = localStorage.getItem("cart_id");

    if (!cartId) {
        throw new Error("Cart not found.");
    }

    const response = await fetch("/api/store/orders/create/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": "{{ csrf_token }}"
        },
        credentials: "include",
        body: JSON.stringify({ cart_id: cartId })
    });

    if (!response.ok) {
        throw new Error("Order creation failed");
    }

    const data = await safeJson(response);

    if (!data.id) {
        throw new Error("Invalid order response");
    }

    createdOrderId = data.id;
    return createdOrderId;
}

/* ---------------- PAY WITH ECOCASH ---------------- */
async function payWithEcoCash(phone) {

    const response = await fetch(
        `/api/store/orders/${createdOrderId}/pay-ecocash/`,
        {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": "{{ csrf_token }}"
            },
            credentials: "include",
            body: JSON.stringify({ msisdn: phone })
        }
    );

    if (!response.ok) {
        const errorData = await safeJson(response);
        throw new Error(errorData.error || "Payment failed");
    }

    const data = await safeJson(response);

    if (data.success) {
        alert("Payment request sent to your phone 📱");
        localStorage.removeItem("cart_id");
        window.location.href = "/store/";
    } else {
        throw new Error(data.message || "Payment failed.");
    }
}

/* ---------------- PLACE ORDER CLICK ---------------- */
document.getElementById("place-order-btn").addEventListener("click", async () => {

    const errorMsg = document.getElementById("error-msg");
    errorMsg.innerText = "";

    try {
        await createOrder();

        const phone = prompt("Enter your EcoCash number (e.g. 0777123456):");

        if (!phone) {
            throw new Error("Phone number is required.");
        }

        await payWithEcoCash(phone);

    } catch (error) {
        errorMsg.innerText = error.message;
    }
});

</script>

{% endblock %}
