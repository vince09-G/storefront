<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product Details</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    >
</head>
<body class="bg-light">

<div class="container mt-5">
    <a href="/store/" class="btn btn-outline-secondary mb-4">⬅ Back to Store</a>

    <div class="row">
        <div class="col-md-6">
            <div class="border rounded bg-white p-4 shadow-sm">
                <h2 id="title">Loading...</h2>
                <p id="description"></p>
                <h4 class="text-success">$<span id="price"></span></h4>
                <p class="text-muted">
                    Stock: <span id="inventory"></span>
                </p>

                <button
                    class="btn btn-primary mt-3"
                    id="add-to-cart-btn">
                    Add to Cart 🛒
                </button>
            </div>
        </div>
    </div>
</div>

<script>
const productId = {{ product_id }};
let cartId = localStorage.getItem("cart_id"); // global variable

/* ---------------- CART ---------------- */
async function createCart() {
    if (cartId) {
        // Check if cart exists
        const response = await fetch(`/api/store/carts/${cartId}/`);
        if (response.ok) return cartId;
        // If 404, cart was deleted/checked out
        localStorage.removeItem("cart_id");
        cartId = null;
    }

    // Create a new cart
    const response = await fetch("/api/store/carts/", {
        method: "POST",
        headers: { "Content-Type": "application/json" }
    });
    const data = await response.json();
    cartId = data.id;
    localStorage.setItem("cart_id", cartId);
    return cartId;
}


async function addToCart() {
    const cart = await createCart();

    await fetch(`/api/store/carts/${cart}/cart-items/`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ product_id: productId, quantity: 1 })
    });

    alert("Added to cart ✅");
}

/* ---------------- PRODUCT ---------------- */
async function loadProduct() {
    const response = await fetch(`/api/store/products/${productId}/`);
    const product = await response.json();

    document.getElementById("title").textContent = product.title;
    document.getElementById("description").textContent = product.description;
    document.getElementById("price").textContent = product.price;
    document.getElementById("inventory").textContent = product.inventory;

    document.getElementById("add-to-cart-btn")
            .addEventListener("click", addToCart);
}

/* ---------------- INIT ---------------- */
loadProduct();
</script>

</body>
</html>
