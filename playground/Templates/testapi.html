<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shop</title>
  <style>
    .product-card {
      border: 1px solid #ddd;
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <h1>Products</h1>

  <!-- Filter Controls -->
  <label>Category:</label>
  <select id="category-filter">
    <option value="">All</option>
    <option value="1">Electronics</option>
    <option value="2">Smart Home</option>
  </select>

  <label>Max Price:</label>
  <input type="number" id="price-filter" placeholder="e.g. 50">

  <button id="apply-filter">Apply</button>

  <!-- Product List -->
  <div id="product-list"></div>

  <script>
    async function fetchProducts(params = '') {
      const response = await fetch(`/store/products/${params}`);
      const data = await response.json();

      const productList = document.getElementById('product-list');
      productList.innerHTML = '';

      data.results.forEach(p => {
        const card = document.createElement('div');
        card.classList.add('product-card');
        card.innerHTML = `
          <h3>${p.title}</h3>
          <p>${p.description}</p>
          <strong>$${p.price}</strong>
        `;
        productList.appendChild(card);
      });
    }

    // Load all products on page load
    fetchProducts();

    // Apply filters
    document.getElementById('apply-filter').addEventListener('click', () => {
      const category = document.getElementById('category-filter').value;
      const price = document.getElementById('price-filter').value;

      let params = '?';
      if (category) params += `collection_id=${category}&`;
      if (price) params += `price__lt=${price}`;

      fetchProducts(params);
    });
  </script>
</body>
</html>
